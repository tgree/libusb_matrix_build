name: Build Linux ARM64 libraries.

on: [push]

jobs:
  build_linux_arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: autogen
        run: cd libusb && ./autogen.sh --disable-udev

      - name: make
        run: cd libusb && make && cp libusb/.libs/libusb-1.0.so libusb/.libs/libusb-linux-arm64-1.0.29.so

      - uses: actions/upload-artifact@v7
        with:
          name: libusb-linux-arm64-1.0.29.so
          path: libusb/libusb/.libs/libusb-linux-arm64-1.0.29.so
