name: Build macOS x86_64 libraries.

on: [push]

jobs:
  build_macos_x86_64:
    strategy:
      matrix:
        macosx_deployment_target: ['10.9', '10.13', '10.15', '11.0']
    runs-on: macos-15-intel
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}

    steps:
      - name: Install dependencies.
        run: brew install automake
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: autogen
        run: cd libusb && ./autogen.sh

      - name: make
        run: cd libusb && make && cp libusb/.libs/libusb-1.0.0.dylib libusb/.libs/libusb-macos-${{ matrix.macosx_deployment_target}}-x86_64-1.0.29.dylib

      - uses: actions/upload-artifact@v7
        with:
          name: libusb-macos-${{ matrix.macosx_deployment_target }}-x86_64-1.0.29.dylib
          path: libusb/libusb/.libs/libusb-macos-${{ matrix.macosx_deployment_target}}-x86_64-1.0.29.dylib
