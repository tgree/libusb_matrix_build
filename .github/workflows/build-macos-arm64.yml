name: Build macOS ARM64 libraries.

on: [push]

jobs:
  build_macos_arm64:
    strategy:
      matrix:
        macosx_deployment_target: ['11.0']
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}

    steps:
      - name: Install dependencies.
        run: brew install autoconf automake libtool m4
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: autogen
        run: cd libusb && ./autogen.sh

      - name: make
        run: cd libusb && make && cp libusb/.libs/libusb-1.0.0.dylib libusb/.libs/libusb-macos-${{ matrix.macosx_deployment_target}}-arm64-1.0.29.dylib

      - uses: actions/upload-artifact@v7
        with:
          name: libusb-macos-${{ matrix.macosx_deployment_target }}-arm64-1.0.29.dylib
          path: libusb/libusb/.libs/libusb-macos-${{ matrix.macosx_deployment_target}}-arm64-1.0.29.dylib
